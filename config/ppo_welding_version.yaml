behaviors:
  WeldingAgent:
    trainer_type: ppo

    hyperparameters:
      batch_size: 128
      buffer_size: 2048
      learning_rate: 3.0e-4
      beta: 5.0e-3
      epsilon: 0.2
      lambd: 0.95
      num_epoch: 3

    network_settings:
      normalize: true
      hidden_units: 256
      num_layers: 2
      vis_encode_type: simple

    reward_signals:
      extrinsic:
        gamma: 0.99
        strength: 1.0

    max_steps: 5000000
    time_horizon: 128
    summary_freq: 10000

environment_parameters:
  seam_random_range:
    curriculum:
      - name: fixed_seam
        completion_criteria:
          measure: progress
          behavior: WeldingAgent
          signal_smoothing: true
          min_lesson_length: 100
          threshold: 0.75
        value: 0.0

      - name: slightly_random_seam
        completion_criteria:
          measure: progress
          behavior: WeldingAgent
          signal_smoothing: true
          min_lesson_length: 100
          threshold: 0.75
        value: 0.02

  cross_track_tolerance:
    curriculum:
      - name: loose_tolerance
        completion_criteria:
          measure: progress
          behavior: WeldingAgent
          signal_smoothing: true
          min_lesson_length: 100
          threshold: 0.75
        value: 0.08

      - name: strict_tolerance
        value: 0.05