default_settings:
  trainer_type: ppo
  max_steps: 10000000
  time_horizon: 256
  summary_freq: 10000
  keep_checkpoints: 5
  checkpoint_interval: 100000
  hyperparameters:
    batch_size: 2048
    buffer_size: 20480
    learning_rate: 3.0e-4
    learning_rate_schedule: linear
    beta: 5.0e-3
    epsilon: 0.2
    lambd: 0.95
    num_epoch: 3
  network_settings:
    normalize: true
    hidden_units: 512
    num_layers: 3
  reward_signals:
    extrinsic:
      gamma: 0.99
      strength: 1.0

behaviors:
  KukaPickPlace:
    trainer_type: ppo
    max_steps: 10000000
    time_horizon: 1024
    summary_freq: 10000
    keep_checkpoints: 5
    checkpoint_interval: 100000

    hyperparameters:
      batch_size: 1024
      buffer_size: 10240
      learning_rate: 3.0e-4
      learning_rate_schedule: linear
      beta: 1.0e-2
      epsilon: 0.2
      lambd: 0.99
      num_epoch: 3

    network_settings:
      normalize: true
      hidden_units: 256
      num_layers: 2
      vis_encode_type: simple

    reward_signals:
      extrinsic:
        gamma: 0.995
        strength: 1.0

# Curriculum: environment_parameters
# "phase" controls which reward terms are active:
#   0 = Reach only -> 1 = Reach+Pick -> 2 = Carry -> 3 = Full Pick-and-Place

environment_parameters:
  phase:
    curriculum:
      - name: Reach
        completion_criteria:
          measure: reward
          behavior: KukaPickPlace
          min_lesson_length: 100
          threshold: 0.2
          require_reset: true
        value: 0.0

      - name: Pick
        completion_criteria:
          measure: reward
          behavior: KukaPickPlace
          min_lesson_length: 100
          threshold: 1.0
          require_reset: true
        value: 1.0

      - name: Carry
        completion_criteria:
          measure: reward
          behavior: KukaPickPlace
          min_lesson_length: 200
          threshold: 1.5
          require_reset: true
        value: 2.0

      - name: Place
        value: 3.0

  max_step:
    curriculum:
      - name: Short
        completion_criteria:
          measure: reward
          behavior: KukaPickPlace
          min_lesson_length: 100
          threshold: 0.2
          require_reset: false
        value: 1000.0

      - name: Medium
        completion_criteria:
          measure: reward
          behavior: KukaPickPlace
          min_lesson_length: 100
          threshold: 1.0
          require_reset: false
        value: 2000.0

      - name: CarryLong
        completion_criteria:
          measure: reward
          behavior: KukaPickPlace
          min_lesson_length: 100
          threshold: 1.5
          require_reset: false
        value: 3000.0

      - name: Full
        value: 4000.0

  # approach_scale is used without the *100 multiplier (removed in 2026-04-02 fix).
  # Values in range [0.5, 2.0] give per-step reward ~0.005-0.02 for 1cm movement.
  approach_scale:
    curriculum:
      - name: HighShaping
        completion_criteria:
          measure: reward
          behavior: KukaPickPlace
          min_lesson_length: 100
          threshold: 0.2
          require_reset: false
        value: 2.0

      - name: MedShaping
        completion_criteria:
          measure: reward
          behavior: KukaPickPlace
          min_lesson_length: 100
          threshold: 1.0
          require_reset: false
        value: 1.0

      - name: LowShaping
        value: 0.5

  carry_scale:
    curriculum:
      - name: Off
        completion_criteria:
          measure: reward
          behavior: KukaPickPlace
          min_lesson_length: 100
          threshold: 1.0
          require_reset: false
        value: 0.0

      - name: LowCarry
        completion_criteria:
          measure: reward
          behavior: KukaPickPlace
          min_lesson_length: 200
          threshold: 1.5
          require_reset: false
        value: 2.0

      - name: FullCarry
        value: 4.0
