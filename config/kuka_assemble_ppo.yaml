# Behavior Name needs to match the Behavior Parameters component on the object
# that carries KukaAssembleAgent. This initial config assumes one global depth
# camera plus vector observations from the agent script.
behaviors:
  KukaAssemble:
    trainer_type: ppo
    hyperparameters:
      batch_size: 1024
      buffer_size: 10240
      learning_rate: 3.0e-4
      learning_rate_schedule: linear
      beta: 5.0e-4
      epsilon: 0.2
      lambd: 0.95
      num_epoch: 3
    network_settings:
      normalize: true
      hidden_units: 256
      num_layers: 3
      vis_encode_type: simple
    reward_signals:
      extrinsic:
        gamma: 0.99
        strength: 1.0
    keep_checkpoints: 200
    checkpoint_interval: 1000000
    max_steps: 30000000
    time_horizon: 128
    summary_freq: 50000

# V4 curriculum: reward-gated, advance once L0 mastery is demonstrated rather
# than always at a fixed step count. Old progress-gated setup wasted compute
# (L0 plateaued ~130 by step 10M but stayed til 20M) and let the policy
# over-fit to L0's loose regime.
#   L0: loose alignment, position-only completion, boosted insertion shaping.
#       Advance to L1 when smoothed mean reward >= 100 (typically reached by
#       step 6-10M based on prior runs).
#   L1: softened mid alignment + full pose required for completion.
#       Advance to L2 when smoothed mean reward >= 100 again under L1 rules.
#   L2: serialized full difficulty.
# signal_smoothing keeps a single lucky episode from triggering early advance.
# min_lesson_length forces at least N reward summaries before checking, so a
# brief reward spike right at lesson start can't immediately advance again.
environment_parameters:
  curriculum_lesson:
    curriculum:
      - name: L0_AlignLoose_InsertEager
        completion_criteria:
          measure: reward
          behavior: KukaAssemble
          signal_smoothing: true
          min_lesson_length: 100
          threshold: 100
        value: 0.0
      - name: L1_AlignMedium
        completion_criteria:
          measure: reward
          behavior: KukaAssemble
          signal_smoothing: true
          min_lesson_length: 100
          threshold: 100
        value: 1.0
      - name: L2_Full
        value: 2.0
