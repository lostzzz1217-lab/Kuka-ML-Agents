behaviors:
  CamWelding:
    trainer_type: ppo
    hyperparameters:
      batch_size: 2048          # 视觉任务需要更大的 batch
      buffer_size: 20480        # 缓存也同步放大
      learning_rate: 0.0003
      beta: 0.005
      epsilon: 0.2
      lambd: 0.95
      num_epoch: 3
      learning_rate_schedule: linear
    network_settings:
      normalize: false
      hidden_units: 256
      num_layers: 3
      # 【极其关键】激活视觉卷积神经网络
      vis_encode_type: simple
    reward_signals:
      extrinsic:
        gamma: 0.99
        strength: 1.0
    max_steps: 10000000         # 视觉训练收敛极慢，准备好跑个 1000 万步
    time_horizon: 128
    summary_freq: 50000