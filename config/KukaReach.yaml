behaviors:
  KukaReach:
    trainer_type: ppo
    hyperparameters:
      batch_size: 2048
      buffer_size: 40960
      learning_rate: 3.0e-4
      beta: 0.005
      learning_rate_schedule: constant
    network_settings:
      normalize: true 
      hidden_units: 256
      num_layers: 2
      vis_encode_type: simple
    reward_signals:
      extrinsic:
        gamma: 0.99
        strength: 1.0
    max_steps: 25000000
    even_checkpoints: true
    time_horizon: 64
    summary_freq: 10000

environment_parameters:
  reach_threshold:
    curriculum:
      - value:
          sampler_type: constant
          sampler_parameters:
            value: 0.15     
        name: Lesson0_Easy
        completion_criteria:
          measure: progress 
          behavior: KukaReach
          signal_smoothing: true
          min_lesson_length: 100
          threshold: 0.06
      - value:
          sampler_type: constant
          sampler_parameters:
            value: 0.08     
        name: Lesson1_Medium
        completion_criteria:
          measure: progress 
          behavior: KukaReach
          signal_smoothing: true
          min_lesson_length: 100
          threshold: 0.18
      - value:
          sampler_type: constant
          sampler_parameters:
            value: 0.02     
        name: Lesson2_Hard

  alignment_threshold:
    curriculum:
      - value:
          sampler_type: constant
          sampler_parameters:
            value: 0.15     
        name: Lesson0_Easy
        completion_criteria:
          measure: progress 
          behavior: KukaReach
          signal_smoothing: true
          min_lesson_length: 100
          threshold: 0.06
      - value:
          sampler_type: constant
          sampler_parameters:
            value: 0.05     
        name: Lesson1_Medium
        completion_criteria:
          measure: progress 
          behavior: KukaReach
          signal_smoothing: true
          min_lesson_length: 100
          threshold: 0.18
      - value:
          sampler_type: constant
          sampler_parameters:
            value: 0.02     
        name: Lesson2_Hard

  grab_pause_frames:
    curriculum:
      - name: Lesson0_QuickGrab
        completion_criteria:
          measure: reward
          behavior: KukaReach
          signal_smoothing: true
          min_lesson_length: 100
          threshold: 30.0
        value: 10.0 
      - name: Lesson1_NormalGrab
        completion_criteria:
          measure: reward
          behavior: KukaReach
          signal_smoothing: true
          min_lesson_length: 100
          threshold: 50.0
        value: 30.0 
      - name: Lesson2_SolidGrab
        value: 50.0

  drop_pause_frames:
    curriculum:
      - name: Lesson0_Touch_And_Drop
        completion_criteria:
          measure: reward
          behavior: KukaReach
          signal_smoothing: true
          min_lesson_length: 100
          threshold: 30.0
        value: 10.0 
      - name: Lesson1_ShortHover
        completion_criteria:
          measure: reward
          behavior: KukaReach
          signal_smoothing: true
          min_lesson_length: 100
          threshold: 50.0
        value: 100.0 
      - name: Lesson2_Mastery
        value: 200.0