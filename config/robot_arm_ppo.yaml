behaviors:
  KukaReach:
    trainer_type: ppo
    hyperparameters:
      batch_size: 1024
      buffer_size: 10240
      learning_rate: 3.0e-4
      learning_rate_schedule: linear
      beta: 5.0e-3
      epsilon: 0.2
      lambd: 0.95
      num_epoch: 3
    network_settings:
      normalize: true
      hidden_units: 256
      num_layers: 3
      vis_encode_type: simple
    reward_signals:
      extrinsic:
        gamma: 0.99
        strength: 1.0
    max_steps: 15000000
    time_horizon: 64
    summary_freq: 10000
    keep_checkpoints: 5
    checkpoint_interval: 200000

environment_parameters:
  grab_pause_frames:
    curriculum:
      - name: Lesson0_TouchAndDrop
        completion_criteria:
          measure: reward
          behavior: KukaReach
          signal_smoothing: true
          min_lesson_length: 100
          threshold: 20.0
        value: 5.0
      - name: Lesson1_ShortHover
        completion_criteria:
          measure: reward
          behavior: KukaReach
          signal_smoothing: true
          min_lesson_length: 100
          threshold: 25.0
        value: 15.0
      - name: Lesson2_Mastery
        value: 30.0

  drop_pause_frames:
    curriculum:
      - name: Lesson0_TouchAndDrop
        completion_criteria:
          measure: reward
          behavior: KukaReach
          signal_smoothing: true
          min_lesson_length: 100
          threshold: 20.0
        value: 5.0
      - name: Lesson1_ShortHover
        completion_criteria:
          measure: reward
          behavior: KukaReach
          signal_smoothing: true
          min_lesson_length: 100
          threshold: 25.0
        value: 15.0
      - name: Lesson2_Mastery
        value: 30.0

