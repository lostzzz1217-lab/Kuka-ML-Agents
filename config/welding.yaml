behaviors:
  WeldingAgent:
    trainer_type: ppo
    hyperparameters:
      batch_size: 1024 # 如果轨迹较长，batch_size可以适当增大
      buffer_size: 10240
      learning_rate: 0.0003
      beta: 0.005
      epsilon: 0.2
      lambd: 0.95
      num_epoch: 3
      learning_rate_schedule: linear
    network_settings:
      normalize: true # 极度重要！各种距离、角度数值差异大，必须开正则化
      hidden_units: 256
      num_layers: 3
    reward_signals:
      extrinsic:
        gamma: 0.99
        strength: 1.0
    max_steps: 5000000 # 连续控制比较难，建议给足 500 万步
    time_horizon: 64
    summary_freq: 10000